<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alp Cagatay Batuhan | Introduction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #111;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 800px;
      text-align: center;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #bbb;
      margin-bottom: 25px;
      font-size: 16px;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid #333;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #777;
    }

    .footer a {
      color: #ccc;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 id="title">Hello 👋</h1>
  <p id="subtitle">Thank you for reviewing my application.</p>

  <div class="video-container">
    <iframe id="videoFrame" allowfullscreen></iframe>
  </div>

  <div class="footer">
    <p>
      Alp Cagatay Batuhan · 
      <a href="https://alpcagatay.github.io" target="_blank">Portfolio</a>
    </p>
  </div>
</div>

<script>
  // Read query param
  const params = new URLSearchParams(window.location.search);
  const key = params.get("t");

  // CONFIGURATION (EDIT THIS PART ONLY)
  const videos = {
    ing: {
      title: "Hello 👋",
      subtitle: "Thank you for considering my application. I'm excited about this opportunity",
      videoId: "REPLACE_WITH_VIDEO_ID_1"
    },
    mastercard: {
      title: "Hello👋",
      subtitle: "I appreciate your time and would love to contribute to your team.",
      videoId: "REPLACE_WITH_VIDEO_ID_2"
    },
    default: {
      title: "Hello 👋",
      subtitle: "Thank you for taking the time to review my profile.",
      videoId: "REPLACE_WITH_DEFAULT_VIDEO"
    }
  };

  const config = videos[key] || videos.default;

  // Apply content
  document.getElementById("title").innerText = config.title;
  document.getElementById("subtitle").innerText = config.subtitle;

  document.getElementById("videoFrame").src =
    "https://www.youtube.com/embed/" + config.videoId;
</script>

</body>
</html>
